<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simon — Mémorise la séquence</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0F0F13;
    --surface: #16161C;
    --border: #22222C;
    --text: #E8E8F0;
    --muted: #55556A;

    --c0: #4A7CCC; /* bleu */
    --c1: #CC4A72; /* rose */
    --c2: #4AB087; /* vert sauge */
    --c3: #C89A3C; /* ambre */

    --c0-glow: #4A7CCC44;
    --c1-glow: #CC4A7244;
    --c2-glow: #4AB08744;
    --c3-glow: #C89A3C44;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 32px;
    padding: 24px;
    user-select: none;
  }

  header {
    text-align: center;
  }

  h1 {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .score-wrap {
    display: flex;
    align-items: baseline;
    justify-content: center;
    gap: 6px;
    margin-top: 8px;
  }

  #score {
    font-family: 'DM Mono', monospace;
    font-size: 56px;
    font-weight: 400;
    line-height: 1;
    color: var(--text);
    transition: color 0.15s;
  }

  #best {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--muted);
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    width: min(400px, 100%);
  }

  .tile {
    aspect-ratio: 1 / 0.8;
    border-radius: 16px;
    border: 1px solid var(--border);
    background: var(--surface);
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform 0.08s ease;
  }

  .tile::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    opacity: 0;
    transition: opacity 0.12s ease;
  }

  .tile[data-i="0"]::before { background: var(--c0); box-shadow: 0 0 40px 10px var(--c0-glow); }
  .tile[data-i="1"]::before { background: var(--c1); box-shadow: 0 0 40px 10px var(--c1-glow); }
  .tile[data-i="2"]::before { background: var(--c2); box-shadow: 0 0 40px 10px var(--c2-glow); }
  .tile[data-i="3"]::before { background: var(--c3); box-shadow: 0 0 40px 10px var(--c3-glow); }

  .tile.lit::before { opacity: 1; }
  .tile.lit { transform: scale(0.97); }

  .tile:active:not([disabled]) { transform: scale(0.95); }

  /* corner dot indicator */
  .tile::after {
    content: '';
    position: absolute;
    top: 12px;
    left: 12px;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    opacity: 0.4;
  }
  .tile[data-i="0"]::after { background: var(--c0); }
  .tile[data-i="1"]::after { background: var(--c1); }
  .tile[data-i="2"]::after { background: var(--c2); }
  .tile[data-i="3"]::after { background: var(--c3); }

  .tile[disabled] { cursor: default; }

  .controls {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  #status {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.04em;
    height: 18px;
    text-align: center;
    transition: color 0.2s;
  }

  #status.fail { color: #CC4A72; }

  #btn-start {
    background: var(--text);
    color: var(--bg);
    border: none;
    padding: 12px 32px;
    border-radius: 100px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: opacity 0.15s, transform 0.1s;
  }

  #btn-start:hover { opacity: 0.88; }
  #btn-start:active { transform: scale(0.97); }

  @media (prefers-reduced-motion: reduce) {
    .tile, .tile::before { transition: none; }
  }
</style>
</head>
<body>

<header>
  <h1>Simon</h1>
  <div class="score-wrap">
    <span id="score">0</span>
    <span id="best"></span>
  </div>
</header>

<div class="grid" id="grid">
  <div class="tile" data-i="0"></div>
  <div class="tile" data-i="1"></div>
  <div class="tile" data-i="2"></div>
  <div class="tile" data-i="3"></div>
</div>

<div class="controls">
  <div id="status">Prêt à jouer</div>
  <button id="btn-start">Commencer</button>
</div>

<script>
const tiles = Array.from(document.querySelectorAll('.tile'));
const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');
const statusEl = document.getElementById('status');
const btnStart = document.getElementById('btn-start');

// Sounds via Web Audio API
const ctx = new (window.AudioContext || window.webkitAudioContext)();

function playTone(i, duration = 200) {
  const freqs = [261.6, 329.6, 392.0, 523.3]; // C D G C
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.type = 'sine';
  osc.frequency.value = freqs[i];
  gain.gain.setValueAtTime(0, ctx.currentTime);
  gain.gain.linearRampToValueAtTime(0.18, ctx.currentTime + 0.01);
  gain.gain.linearRampToValueAtTime(0, ctx.currentTime + duration / 1000);
  osc.start(ctx.currentTime);
  osc.stop(ctx.currentTime + duration / 1000 + 0.05);
}

function playFail() {
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.type = 'sawtooth';
  osc.frequency.value = 110;
  gain.gain.setValueAtTime(0.12, ctx.currentTime);
  gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.5);
  osc.start(ctx.currentTime);
  osc.stop(ctx.currentTime + 0.55);
}

// Game state
let sequence = [];
let playerIndex = 0;
let score = 0;
let best = parseInt(localStorage.getItem('simon-best') || '0');
let accepting = false;

updateBest();

function updateBest() {
  bestEl.textContent = best > 0 ? `meilleur : ${best}` : '';
}

function setScore(n) {
  score = n;
  scoreEl.textContent = n;
}

function setStatus(msg, fail = false) {
  statusEl.textContent = msg;
  statusEl.classList.toggle('fail', fail);
}

function lightTile(i, duration = 400) {
  return new Promise(res => {
    playTone(i, duration - 80);
    tiles[i].classList.add('lit');
    setTimeout(() => {
      tiles[i].classList.remove('lit');
      setTimeout(res, 80);
    }, duration);
  });
}

function disableTiles(state) {
  tiles.forEach(t => state ? t.setAttribute('disabled', '') : t.removeAttribute('disabled'));
  accepting = !state;
}

async function playSequence() {
  disableTiles(true);
  setStatus('Observe…');
  await delay(600);

  const speed = Math.max(250, 500 - sequence.length * 15);

  for (const i of sequence) {
    await lightTile(i, speed);
    await delay(80);
  }

  setStatus('À toi !');
  playerIndex = 0;
  disableTiles(false);
}

async function startGame() {
  btnStart.style.display = 'none';
  sequence = [];
  setScore(0);
  statusEl.classList.remove('fail');
  await nextRound();
}

async function nextRound() {
  sequence.push(Math.floor(Math.random() * 4));
  await playSequence();
}

function delay(ms) {
  return new Promise(res => setTimeout(res, ms));
}

async function handleTileClick(i) {
  if (!accepting) return;
  ctx.resume();

  await lightTile(i, 180);

  if (i !== sequence[playerIndex]) {
    // Wrong!
    accepting = false;
    playFail();
    setStatus('Raté !', true);
    if (score > best) {
      best = score;
      localStorage.setItem('simon-best', best);
      updateBest();
    }
    await delay(800);
    // Flash all tiles
    tiles.forEach(t => t.classList.add('lit'));
    await delay(300);
    tiles.forEach(t => t.classList.remove('lit'));
    await delay(300);
    disableTiles(true);
    setStatus(`Séquence de ${score} — recommence ?`);
    btnStart.textContent = 'Rejouer';
    btnStart.style.display = '';
    return;
  }

  playerIndex++;
  setScore(score + 1);

  if (playerIndex === sequence.length) {
    // Round complete
    accepting = false;
    setStatus('Bien joué !');
    await delay(700);
    await nextRound();
  }
}

tiles.forEach(t => {
  t.addEventListener('click', () => handleTileClick(parseInt(t.dataset.i)));
});

btnStart.addEventListener('click', () => {
  ctx.resume();
  startGame();
});

disableTiles(true);
</script>
</body>
</html>
